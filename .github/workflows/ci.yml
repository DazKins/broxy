name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test ./...
      - run: GOOS=linux GOARCH=amd64 go build ./cmd/broxy
      - run: GOOS=linux GOARCH=arm64 go build ./cmd/broxy
      - run: GOOS=darwin GOARCH=amd64 go build ./cmd/broxy
      - run: GOOS=darwin GOARCH=arm64 go build ./cmd/broxy
      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: check
